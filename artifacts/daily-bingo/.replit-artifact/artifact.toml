kind = "web"
previewPath = "/"
title = "Daily Challenge Bingo"
version = "1.0.0"
id = "artifacts/daily-bingo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26034

[services.development]
run = "pnpm --filter @workspace/daily-bingo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/daily-bingo", "run", "build" ]
publicDir = "artifacts/daily-bingo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26034"
BASE_PATH = "/"
